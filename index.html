<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Haunted Luopan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #5d0202; /* Deep, dark blood red for the atmosphere */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: serif;
        }

        .compass-frame {
            position: relative;
            width: 85vmin; /* Slightly smaller for focus */
            height: 85vmin;
            background-color: #1a1a1a; /* Very dark base */
            border-radius: 15px; 
            box-shadow: 0 0 80px rgba(0,0,0,0.8); /* Deep shadow */
            display: flex;
            justify-content: center;
            align-items: center;
            border: 10px solid #222;
        }

        /* The Dial (Static) */
        .luopan-image {
            width: 90%;
            height: 90%;
            object-fit: contain;
            border-radius: 50%;
            background-color: #e8dfc1; /* Aged paper effect */
            z-index: 1; /* Dial is at the bottom */
            opacity: 0.95; /* Subtle ghostliness */
            filter: brightness(70%) /* reduce brightness*/
        }

        /* The Needle (Layered over the dial) */
        .luopan-needle {
            position: absolute;
            width: 15%; /* Needle length scaled to the center dial */
            height: 50%;
            z-index: 5; /* Needle is on top */
            /* Crucial for centering a position:absolute element */
            top: 50%;
            left: 50%;
            /* Offset by half its size, then dynamic rotation from JS is appended */
            transform-origin: center center;
            opacity: 0.85; /* Makes it look spectral and aged */
            
            /* The 4-way black outline technique */
            filter: drop-shadow(1px 1px 0px black) 
                    drop-shadow(-1px -1px 0px black) 
                    drop-shadow(1px -1px 0px black) 
                    drop-shadow(-1px 1px 0px black);
            
            /* CSS Transition: Smoothly interpolates the rotation changes from JS */
            transition: transform 0.1s ease-out; /* 'Shiver' speed (medium) */
        }
    </style>
</head>
<body>

    <div class="compass-frame">
        <img src="luopan.png" alt="Feng Shui Luopan Dial" class="luopan-image">
        
        <img src="luopan_needle.png" alt="Haunted Needle" class="luopan-needle" id="hauntedNeedle">
    </div>

    <script>
        const needle = document.getElementById('hauntedNeedle');
        
        /* Configuration for the 'Haunting' effect */
        const baseAngle = 180; // The needle points 'South' (down) in Chinese practice
        const maxDeviance = 100; // The maximum random offset in degrees (+/-)
        const updateIntervalMS = 60; // How fast the shiver changes (milliseconds)
        
        function updateHaunting() {
            // 1. Generate a new, random deviance
            const randomOffset = (Math.random() - 0.5) * 2 * maxDeviance;
            
            // 2. Calculate the new complete angle
            const newAngle = baseAngle + randomOffset;
            
            // 3. Apply the rotation. 
            // Note: the translate(-50%, -50%) keeps the image centered, 
            // and the rotation is appended.
            needle.style.transform = `translate(-50%, -50%) rotate(${newAngle}deg)`;
            
            // 4. Repeat recursively (a high-frequency loop)
            setTimeout(updateHaunting, updateIntervalMS);
        }
        
        // Start the haunting
        updateHaunting();
    </script>

</body>
</html>
