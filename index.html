<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Haunted Luopan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #5d0202; /* Deep, dark blood red */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Crimson Text', serif;
        }

        .compass-frame {
            position: relative;
            width: 85vmin;
            height: 85vmin;
            background-color: #1a1a1a;
            border-radius: 15px; 
            box-shadow: 0 0 80px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 10px solid #222;
        }

        .luopan-image {
            width: 90%;
            height: 90%;
            object-fit: contain;
            border-radius: 50%;
            background-color: #e8dfc1;
            z-index: 1;
            opacity: 0.95;
            filter: brightness(70%);
        }

        .luopan-needle {
            position: absolute;
            width: 15%;
            height: 50%;
            z-index: 5;
            top: 50%;
            left: 50%;
            transform-origin: center center;
            opacity: 0.85;
            filter: drop-shadow(1px 1px 0px black) 
                    drop-shadow(-1px -1px 0px black) 
                    drop-shadow(1px -1px 0px black) 
                    drop-shadow(-1px 1px 0px black);
            transition: transform 0.1s ease-out;
        }

        /* --- Fullscreen Button Styles --- */
        #fs-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: #bcbcbc;
            border: 1px solid #444;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            z-index: 10;
        }

        #fs-btn:hover {
            background: #7a0000;
            color: white;
            box-shadow: 0 0 15px #ff0000;
        }
    </style>
</head>
<body>

    <div class="compass-frame">
        <img src="luopan.png" alt="Feng Shui Luopan Dial" class="luopan-image">
        <img src="luopan_needle.png" alt="Haunted Needle" class="luopan-needle" id="hauntedNeedle">
    </div>

    <button id="fs-btn">Enter The Void</button>

    <script>
        const needle = document.getElementById('hauntedNeedle');
        const fsBtn = document.getElementById('fs-btn');
        
        // --- Haunting Logic ---
        const baseAngle = 180; 
        const maxDeviance = 100; 
        const updateIntervalMS = 60; 
        
        function updateHaunting() {
            const randomOffset = (Math.random() - 0.5) * 2 * maxDeviance;
            const newAngle = baseAngle + randomOffset;
            needle.style.transform = `translate(-50%, -50%) rotate(${newAngle}deg)`;
            setTimeout(updateHaunting, updateIntervalMS);
        }
        
        // --- Fullscreen Logic ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message}`);
                });
                fsBtn.innerText = "Exit The Void";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    fsBtn.innerText = "Enter The Void";
                }
            }
        }

        fsBtn.addEventListener('click', toggleFullScreen);
        
        // Start the haunting
        updateHaunting();
    </script>

</body>
</html>
